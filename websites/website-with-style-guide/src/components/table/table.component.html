<div class="table-wrapper">
  <p id="products-table-description" class="sr-only">
    Product list with product name, category, price, rating and row actions.
  </p>
  <p-table
    styleClass="sg-table product-table"
    [value]="products"
    [rowHover]="true"
    [attr.aria-describedby]="'products-table-description'"
  >
    <ng-template pTemplate="header">
      <tr>
        <th scope="col">Name</th>
        <th scope="col">Category</th>
        <th scope="col">Price</th>
        <th scope="col">Rating</th>
        <th scope="col" class="actions-header">Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-product>
      <tr
        tabindex="0"
        (click)="onSelect(product)"
        (focus)="onSelect(product)"
        [class.selected-row]="selectedProductId === product.id"
        [attr.aria-selected]="selectedProductId === product.id"
      >
        <th scope="row" class="name-cell">{{ product.name }}</th>
        <td>
          <span class="status-pill" [ngClass]="getCategoryClass(product.category)">
            <i class="pi pi-tag" aria-hidden="true"></i>
            {{ product.category }}
          </span>
        </td>
        <td>{{ product.price | currency: 'EUR' }}</td>
        <td>
          <span class="rating-text">
            <i class="pi pi-star-fill" aria-hidden="true"></i>
            {{ product.rating }}/5
          </span>
        </td>
        <td class="actions-cell">
          <div class="table-actions">
            <p-button
              icon="pi pi-pencil"
              styleClass="sg-button-primary-inverted table-action"
              (onClick)="onEdit(product)"
              [ariaLabel]="'Edit ' + product.name"
            ></p-button>
            <p-button
              icon="pi pi-trash"
              styleClass="sg-button-cancel table-action"
              (onClick)="onDelete(product)"
              [ariaLabel]="'Delete ' + product.name"
              [attr.aria-keyshortcuts]="selectedProductId === product.id ? 'Delete' : null"
            ></p-button>
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5">
          <div class="empty-state">
            <i class="pi pi-info-circle" aria-hidden="true"></i>
            <span>No products available. Add your first product above.</span>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
