<div class="custom-table-wrapper">
  <table>
    <thead>
      <tr class="table-header">
        <th class="header-1">Name</th>
        <th class="header-2">Category</th>
        <th class="header-3">Price</th>
        <th class="header-3">Rating</th>
        <th class="header-actions">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr class="row-item" *ngFor="let product of products; let i = index">
        <td class="name-cell">{{ product.name }}</td>
        <td [class.category-highlight]="product.category === 'Sweet'">{{ product.category }}</td>
        <td class="price-cell">{{ product.price | currency: 'EUR' }}</td>
        <td class="rating-cell">
          <span *ngFor="let star of [1,2,3,4,5]" [class.filled]="star <= product.rating">★</span>
        </td>
        <td class="actions-cell">
          <button class="action-button action-edit" (click)="onEdit(product)" aria-label="Edit product">
            ✎
          </button>
          <button class="action-button action-delete" (click)="onDelete(product)" aria-label="Delete product">
            🗑
          </button>
        </td>
      </tr>
    </tbody>
  </table>
  <div *ngIf="products.length === 0" class="empty-state">
    <p>No products available. Add your first product above!</p>
  </div>
</div>
