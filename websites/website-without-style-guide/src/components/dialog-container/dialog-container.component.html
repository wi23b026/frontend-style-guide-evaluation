<div *ngIf="hasBackdrop()" class="dialog-backdrop"></div>

<div class="dialog-container">
  <div *ngFor="let dialog of dialogs" [class]="'dialog dialog-' + dialog.type">
    <div class="dialog-header">
      <h3 class="dialog-title">{{ dialog.title }}</h3>
      <button class="dialog-close" (click)="cancel(dialog)" aria-label="Close dialog">
        ✕
      </button>
    </div>
    <div class="dialog-content">
      <p class="dialog-message">{{ dialog.message }}</p>
    </div>
    <div class="dialog-footer">
      <button *ngIf="dialog.cancelText" class="dialog-button dialog-button-secondary" (click)="cancel(dialog)">
        {{ dialog.cancelText }}
      </button>
      <button class="dialog-button dialog-button-primary" (click)="confirm(dialog)">
        {{ dialog.confirmText }}
      </button>
    </div>
  </div>
</div>
